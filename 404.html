<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eaf1ff;
      color: #0c172f;
      font-family: Inter, system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      margin: 0 0 1rem;
      letter-spacing: -0.04em;
    }
    p {
      font-size: 1rem;
      color: #475569;
      line-height: 1.8;
      max-width: 32rem;
      margin: 0 auto 1.75rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.95rem 1.5rem;
      background: #2563eb;
      color: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 16px 45px rgba(37, 99, 235, 0.14);
    }
    a:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div>
    <h1>404 — Page not found</h1>
    <p>Looks like the page you were trying to reach doesn't exist. Head back to the portfolio homepage and keep exploring.</p>
    <a href="index.html">Go back home</a>
  </div>
</body>
</html>
